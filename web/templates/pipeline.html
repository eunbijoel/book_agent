{% extends "base.html" %}
{% block title %}Pipeline - Book Agent{% endblock %}

{% block content %}
<h1>Pipeline</h1>

{% if not ollama_ok %}
<article class="pico-background-red-500">
    <p>Ollama 서버에 연결할 수 없습니다. <code>ollama serve</code>를 실행하세요.</p>
</article>
{% endif %}

<form method="post" action="/pipeline/run">
    <div class="grid">
        <label>목차 선택
            <select name="toc_file" required>
                <option value="">-- 선택 --</option>
                {% for f in toc_files %}
                <option value="{{ f }}">{{ f }}</option>
                {% endfor %}
            </select>
        </label>
        <label>모델
            <select name="model" required>
                {% for m in models %}
                <option value="{{ m }}" {% if 'gemma4' in m %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
            </select>
        </label>
    </div>

    <div class="grid">
        <label>언어
            <select name="language">
                <option value="ko" selected>Korean</option>
                <option value="en">English</option>
                <option value="ja">Japanese</option>
            </select>
        </label>
        <label>챕터당 단어 수
            <input type="text" name="words" value="3000-5000">
        </label>
    </div>

    <label>
        <input type="checkbox" name="test_mode" value="true">
        테스트 모드 (짧은 챕터 1500-2500단어)
    </label>

    <button type="submit" {% if not ollama_ok %}disabled{% endif %}>생성 시작</button>
</form>

<h2>최근 작업</h2>
<div id="jobs"></div>
{% endblock %}

{% block scripts %}
<script>
async function loadJobs() {
    const res = await fetch('/pipeline/jobs');
    const jobs = await res.json();
    const el = document.getElementById('jobs');
    if (!jobs.length) { el.innerHTML = '<p>실행 기록 없음</p>'; return; }
    el.innerHTML = '<table><thead><tr><th>모델</th><th>TOC</th><th>상태</th><th>시작</th><th></th></tr></thead><tbody>' +
        jobs.map(j => `<tr><td>${j.model}</td><td>${j.toc_file}</td><td>${j.status}</td><td>${new Date(j.started_at).toLocaleString('ko')}</td><td><a href="/pipeline/job/${j.id}">로그</a></td></tr>`).join('') +
        '</tbody></table>';
}
loadJobs();
</script>
{% endblock %}
