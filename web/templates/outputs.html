{% extends "base.html" %}
{% block title %}Outputs - Book Agent{% endblock %}

{% block content %}
<hgroup>
    <h1>생성된 책</h1>
    <p>{{ books|length }}권</p>
</hgroup>

{% include "_book_cards.html" %}
{% endblock %}

{% block scripts %}
<script>
async function deleteBook(slug, title) {
    if (!confirm(`"${title}" 을(를) 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
    await fetch(`/outputs/${slug}`, { method: 'DELETE' });
    location.reload();
}
</script>
{% endblock %}
