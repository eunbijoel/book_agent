# Model configuration for agent_book_writer_v2
# Each agent can use a different model for cost/performance optimization

# ===== 기본 제공자 설정 =====
provider: ollama
base_url: http://localhost:11434

# ===== 제공자별 기본 모델 =====
default_models:
  ollama: gemma4:31b
  gemini: gemini-2.5-flash
  claude: claude-sonnet-4-6
  openai: gpt-4.1-mini

# ===== 에이전트별 모델 오버라이드 (선택) =====
# 비용 절감: planning/research에 저렴한 모델, writing에 고품질 모델
agents:
  planning: null    # null = 기본 모델 사용
  research: null
  writing: null     # 품질이 중요 — 고성능 모델 권장
  reviewer: null
  editor: null
  evaluator: null

# ===== 제공자별 상세 설정 =====
ollama:
  num_ctx: 8192
  temperature:
    planning: 0.3
    research: 0.2
    writing: 0.7
    reviewer: 0.1
    editor: 0.4
    evaluator: 0.1

gemini:
  temperature:
    planning: 0.3
    research: 0.2
    writing: 0.7
    reviewer: 0.1
    editor: 0.4
    evaluator: 0.1

claude:
  region: us-east5
  temperature:
    planning: 0.3
    research: 0.2
    writing: 0.7
    reviewer: 0.1
    editor: 0.4
    evaluator: 0.1

openai:
  temperature:
    planning: 0.3
    research: 0.2
    writing: 0.7
    reviewer: 0.1
    editor: 0.4
    evaluator: 0.1

# ===== 품질 임계값 =====
quality:
  rewrite_threshold: 55    # 이 점수 미만 → 전체 재작성
  revision_threshold: 70   # 이 점수 미만 → 수정 경고
  max_rewrites: 2          # 챕터당 최대 재작성 횟수

# ===== 추천 모델 조합 =====
# 고품질:   claude:claude-sonnet-4-6  또는  openai:gpt-4.1
# 균형:     gemini:gemini-2.5-flash   또는  openai:gpt-4.1-mini
# 무료/로컬: ollama:gemma4:31b        또는  ollama:llama3.1:8b
