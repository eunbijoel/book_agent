name: Publish Book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "outputs/**/site/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Find mkdocs.yml and build
        run: |
          MKDOCS_YML=$(find outputs -name mkdocs.yml -path "*/site/*" | head -1)
          if [ -z "$MKDOCS_YML" ]; then
            echo "No mkdocs.yml found in outputs/*/site/"
            exit 1
          fi
          echo "Building from: $MKDOCS_YML"
          mkdocs build -f "$MKDOCS_YML" -d _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
